name: Notify central sync

on:
  issues:
    types: [opened, edited, reopened, closed, labeled, unlabeled, unassigned, milestoned, demilestoned]
  pull_request:
    types: [opened, edited, reopened, closed, synchronize]

jobs:
  dispatch:
    if: github.event.action != 'assigned'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Kiwoom-Rag workflow
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.CENTRAL_REPO_PAT }}" \
            https://api.github.com/repos/KIWOOMxSNU/Kiwoom-Rag/dispatches \
            -d '{"event_type":"project-sync","client_payload":{"source_repo":"${{ github.repository }}","event_name":"${{ github.event_name }}"}}'
